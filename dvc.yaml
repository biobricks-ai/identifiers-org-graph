stages:
  registry:
    cmd: python stages/build_registry.py
    deps:
      - stages/build_registry.py
      - registry/registry.json
    outs:
      - brick
      - health/source-coverage.json
      - health/build-status.json
  inventory:
    cmd: python stages/inventory.py
    deps:
      - stages/inventory.py
      - registry/registry.json
      - registry/confirmed-repositories.json
    outs:
      - registry/namespace-repositories.tsv
